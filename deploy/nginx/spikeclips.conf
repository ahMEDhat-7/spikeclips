user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # Proxy buffer settings (optimized for small VPS)
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;

    upstream web_server {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name spikeclips.com www.spikeclips.com;
        return 301 https://$host$request_uri;
    }

    # Main site (HTTPS)
    server {
        listen 443 ssl http2;
        server_name spikeclips.com www.spikeclips.com;

        ssl_certificate /etc/letsencrypt/live/spikeclips.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spikeclips.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Static assets (long cache)
        location /_next/static/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://web_server;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Frontend (all routes, including /api/* which Next.js proxies internally)
        location / {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://web_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
