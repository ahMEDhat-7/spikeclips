services:
  postgres:
    image: postgres:18-alpine
    container_name: spikeclips-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: spikeclips
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spikeclips_dev}
      POSTGRES_DB: spikeclips
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spikeclips"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: spikeclips-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-spikeclips_dev_redis}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $${REDIS_PASSWORD:-spikeclips_dev_redis} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: spikeclips-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://spikeclips:${POSTGRES_PASSWORD:-spikeclips_dev}@postgres:5432/spikeclips
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-spikeclips_dev_redis}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80
      JWT_SECRET: ${JWT_SECRET:-spikeclips-dev-jwt-secret-change-in-production}
      CLIPS_DIR: /tmp/spikeclips-clips
      CLIPS_BASE_URL: http://localhost:80/api
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: spikeclips-clips
      MINIO_USE_SSL: "false"
      CLIP_SIGNING_SECRET: ${CLIP_SIGNING_SECRET:-dev-signing-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - clips_data:/tmp/spikeclips-clips
      - ../../node_modules:/app/node_modules:ro
      - ../../apps/api/node_modules:/app/apps/api/node_modules:ro
      - ../../packages/shared/node_modules:/app/packages/shared/node_modules:ro
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    container_name: spikeclips-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: spikeclips-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    volumes:
      - ../../node_modules:/app/node_modules:ro
      - ../../apps/web/node_modules:/app/apps/web/node_modules:ro
      - ../../packages/shared/node_modules:/app/packages/shared/node_modules:ro
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    container_name: spikeclips-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clips_data:
  minio_data:
