services:
  # ─── Database ───
  postgres:
    image: postgres:16-alpine
    container_name: spikeclips-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: spikeclips
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spikeclips_dev}
      POSTGRES_DB: spikeclips
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spikeclips"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: spikeclips-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-spikeclips_dev_redis}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $${REDIS_PASSWORD:-spikeclips_dev_redis} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ─── API ───
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: spikeclips-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://spikeclips:${POSTGRES_PASSWORD:-spikeclips_dev}@postgres:5432/spikeclips
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-spikeclips_dev_redis}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://localhost
      ALLOWED_ORIGINS: http://localhost
      JWT_SECRET: ${JWT_SECRET:-spikeclips-dev-jwt-secret-change-in-production}
      CLIPS_DIR: /tmp/spikeclips-clips
      CLIPS_BASE_URL: http://localhost/api
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: spikeclips-clips
      MINIO_USE_SSL: "false"
      CLIP_SIGNING_SECRET: ${CLIP_SIGNING_SECRET:-dev-signing-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-price_pro_monthly}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-price_pro_yearly}
      STRIPE_TEAM_MONTHLY_PRICE_ID: ${STRIPE_TEAM_MONTHLY_PRICE_ID:-price_team_monthly}
      STRIPE_TEAM_YEARLY_PRICE_ID: ${STRIPE_TEAM_YEARLY_PRICE_ID:-price_team_yearly}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      HEATMAP_WORKER_CONCURRENCY: ${HEATMAP_WORKER_CONCURRENCY:-5}
      CLIP_WORKER_CONCURRENCY: ${CLIP_WORKER_CONCURRENCY:-3}
      UV_THREADPOOL_SIZE: ${UV_THREADPOOL_SIZE:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - clips_data:/tmp/spikeclips-clips
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─── Web (Next.js) ───
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_SITE_URL: http://localhost
        NEXT_PUBLIC_DOMAIN: localhost
    container_name: spikeclips-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─── Nginx reverse proxy ───
  nginx:
    image: nginx:alpine
    container_name: spikeclips-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─── MinIO (optional, only when STORAGE_DRIVER=minio) ───
  minio:
    image: minio/minio:latest
    container_name: spikeclips-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clips_data:
  minio_data:
