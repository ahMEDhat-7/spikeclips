name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spikeclips/shared test
      - run: pnpm --filter @spikeclips/api test
      - run: pnpm --filter @spikeclips/web test

  e2e:
    name: API E2E (compose infra)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://spikeclips:spikeclips_dev@localhost:5433/spikeclips
      REDIS_HOST: localhost
      REDIS_PORT: "6380"
      REDIS_PASSWORD: spikeclips_dev_redis
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start infra (postgres, redis) via docker compose
        run: docker compose -f docker-compose.yml up -d postgres redis
      - name: Wait for postgres to accept connections
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml exec -T postgres pg_isready -U spikeclips >/dev/null 2>&1; then
              echo "postgres ready after ${i} tries"; break
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml exec -T postgres pg_isready -U spikeclips
      - name: Dump postgres logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs postgres
      - run: pnpm --filter @spikeclips/api exec prisma generate
      - run: pnpm --filter @spikeclips/api exec prisma migrate deploy
      - run: pnpm --filter @spikeclips/api test:e2e
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api and web images
        run: docker compose -f docker-compose.yml build api web
